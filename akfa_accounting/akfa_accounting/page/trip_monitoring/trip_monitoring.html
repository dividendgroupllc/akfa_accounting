<div class="trip-monitoring-container">
	<!-- Header -->
	<div class="trip-monitoring-header">
		<div class="trip-info">
			<h2 class="trip-title"></h2>
			<div class="trip-meta"></div>
		</div>
		<div class="trip-actions">
			<button class="btn btn-default btn-refresh">
				<i class="fa fa-refresh"></i> Yangilash
			</button>
			<button class="btn btn-default btn-back">
				<i class="fa fa-arrow-left"></i> Trip Master
			</button>
		</div>
	</div>

	<!-- Main Content -->
	<div class="trip-monitoring-body">
		<!-- Sidebar -->
		<div class="trip-sidebar">
			<!-- Budget Card -->
			<div class="sidebar-card budget-card">
				<div class="card-header">
					<i class="fa fa-money"></i> Byudjet
				</div>
				<div class="card-body budget-content">
					<!-- Filled by JS -->
				</div>
			</div>

			<!-- Members Card -->
			<div class="sidebar-card members-card">
				<div class="card-header">
					<i class="fa fa-users"></i> Azolar
				</div>
				<div class="card-body members-content">
					<!-- Filled by JS -->
				</div>
			</div>

			<!-- Recent Checkins -->
			<div class="sidebar-card checkins-card">
				<div class="card-header">
					<i class="fa fa-map-pin"></i> Songgi check-inlar
				</div>
				<div class="card-body checkins-content">
					<!-- Filled by JS -->
				</div>
			</div>
		</div>

		<!-- Map Area -->
		<div class="trip-map-container">
			<div id="trip-live-map"></div>
		</div>
	</div>
</div>
